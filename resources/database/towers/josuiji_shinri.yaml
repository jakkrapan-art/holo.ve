maxLevel: 3
towerClass: marksman
generation: tempus
attackType: physic
evolutionCost: 1

attack_sound: "hit_shinri"
open_sound: "debut_shinri"
evolve_sound: "evo_shinri"

# Normal attack = homing arrow bullet (dynamic arrow VFX). Damage lands ONCE per shot
# (projectile mode); on a crit the passive fires the citrine pierce arrow instead.
# Colours set here OVERRIDE shinri_arrow.gdshader's own defaults; omit a colour to keep
# the shader default. Shape is baked in the shader; speed/size/glow/colour are tunable
# here. size = arrow HEIGHT px.
attack:
  mode: projectile
  projectile: "res://resources/combat/bullets/shinri_normal_bullet.tscn"
  vfx_shader: "res://resources/tower/holostars/en_branch/tempus_gen/josuiji_shinri/normal_effect/shinri_arrow.gdshader"
  speed: 12
  size: 72
  burst: 1
  glow_softness: 0.12
  core_color: [1.0, 1.0, 1.0]
  mid_color: [0.90, 0.94, 1.0]

# Josuiji Shinri has no Active skill and no Energy — her kit is a pure Passive.
# Stats omit mana/initialMana on purpose: with no active skill the tower builds
# no Energy bar (see Tower._hasActiveSkill / _setupPassive).
stats:
  - damage: 80
    attackRange: 4.0
    attackSpeed: 140.0
    critChance: 0
    critMultiplier: 1.5

  - damage: 160
    attackRange: 4.0
    attackSpeed: 140.0
    critChance: 0
    critMultiplier: 1.5

  - damage: 240
    attackRange: 4.0
    attackSpeed: 140.0
    critChance: 0
    critMultiplier: 1.5

skills:
  passive:
    name: "Bull Eyes"
    names: ["Bull Eyes I", "Bull Eyes II", "Bull Eyes III"]
    desc: "Josuiji Shinri steadies his aim with every shot: each non-critical hit adds a Bull Eyes stack, each granting +{critChancePerStack}% critical chance. On a critical hit, his shot becomes a piercing arrow that hits all enemies in a 1×4 tile line for critical damage +{bonusCritDamage:percent}, then loses all Bull Eyes stacks."
    icon: ""
    tags:
      - damage
      - attack
      - crit_rate
      - projectile
      - aoe
    target_summary:
      target_team: self
      target_type: tower
      target_shape: single
    effects:
      - name: "Bull Eyes Crit Stacking"
        target:
          target_team: self
          target_type: tower
          target_shape: single
      - name: "Heartpierce Arrow"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
    # Designer-tunable numbers (read by desc tokens + the passive runtime).
    parameters:
      critChancePerStack: 5
      # Additive bonus crit damage (x) per level — arrow = ATK × (critDamage + x).
      bonusCritDamage: [0.2, 0.25, 0.4]
    # Behavior selector + structural runtime params (not display tokens).
    behavior: "crit_pierce"
    reset_on_crit: true
    projectile: "res://resources/combat/bullets/shinri_skill_projectile.tscn"
    effect_script: "res://resources/tower/holostars/en_branch/tempus_gen/josuiji_shinri/skill_effect/shinri_skill_effect.gd"
    arrow_speed: 12.0   # tiles/sec
    arrow_range: 4.0    # tiles (pierce line length)

evolutionStat:
  damage: 400
  attackRange: 4.0
  attackSpeed: 140.0
  critChance: 50.0
  critMultiplier: 1.5

evolution_skills:
  passive:
    name: "Heartpierce Shot"
    desc: "Josuiji Shinri's aim turns lethal: each non-critical hit adds a Bull Eyes stack, each granting +{critChancePerStack}% critical chance. On a critical hit, his shot becomes a piercing arrow that hits all enemies in a 1×4 tile line for critical damage +{bonusCritDamage:percent} — and critical hits no longer consume his Bull Eyes stacks."
    icon: ""
    tags:
      - damage
      - attack
      - crit_rate
      - projectile
      - aoe
    target_summary:
      target_team: self
      target_type: tower
      target_shape: single
    effects:
      - name: "Bull Eyes Crit Stacking"
        target:
          target_team: self
          target_type: tower
          target_shape: single
      - name: "Heartpierce Arrow"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
    parameters:
      critChancePerStack: 5
      bonusCritDamage: [1.0]
    behavior: "crit_pierce"
    reset_on_crit: false
    projectile: "res://resources/combat/bullets/shinri_skill_projectile.tscn"
    effect_script: "res://resources/tower/holostars/en_branch/tempus_gen/josuiji_shinri/skill_effect/shinri_evo_skill_effect.gd"
    arrow_speed: 12.0
    arrow_range: 4.0
