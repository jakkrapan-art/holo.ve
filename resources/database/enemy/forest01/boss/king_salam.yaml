# Boss. `name` is the display name; the sprite + id come from the file path
# (resources/enemy/forest01/boss/king_salam/king_salam.png). `wave` lists the
# waves this boss is eligible to spawn on; `scale` is the visual/hitbox size
# multiplier applied at spawn. Skills are inline (3 max by design); balance
# numbers live once in each skill's `parameters` - actions bind via *_param
# keys and the desc renders the same values via {token} (enemy_skill.md).
# Area sizes ("7x7") stay literal in desc until the structural parameterize
# task (post-demo).
name: King Salam
scale: 1.75
wave:
  - 5
stats:
  hp: 8000
  def: 5
  mDef: 5
  moveSpeed: 30
skill:
  - name: Adaptation
    cooldown: 12
    recovery: 0.2
    tags:
      - defense
      - self
    parameters:
      reduction: 0.2
      duration: 5
    desc: "King Salam adapts his royal hide, reducing all damage he takes by {reduction:percent} for {duration} seconds."
    action:
      - type: target_self
      - type: apply_effect
        data:
          effect: damage_reduction_up
          target: targets
          value_param: reduction
          duration_param: duration
          title: "Adaptation"
  - name: Slime Fluid
    cooldown: 15
    cast_time: 0.5
    recovery: 0.2
    tags:
      - debuff
      - attack_speed
      - aoe
    parameters:
      slow: 0.1
      duration: 10
    desc: "King Salam splashes his slime across a 7x7 area, coating units in Slime Fluid that slows their attack speed by {slow:percent} for {duration} seconds."
    action:
      - type: apply_effect
        data:
          effect: slime_fluid
          target: towers_in_range
          range: 3
          value_param: slow
          duration_param: duration
  - name: King's Command
    cooldown: 30
    recovery: 0.2
    tags:
      - channel
      - invincible
      - summon
    parameters:
      channel_time: 4
      summon_count: 10
    desc: "King Salam channels his royal authority for {channel_time} seconds - invincible and untargetable while {summon_count} Armored Salam march out to join the battle at his side."
    action:
      # Channel shape: everything runs INSIDE the delay window. summon_enemy is
      # fire-and-forget (WaveController trickles the batch), so the minions walk
      # out while the delay holds him castLocked and invincible covers the
      # whole window (10 x 0.4s = last summon ~3.6s, inside 4s).
      - type: target_self
      - type: apply_effect
        data:
          effect: invincible
          target: targets
          duration_param: channel_time
      - type: apply_effect
        data:
          effect: royal_command
          target: targets
          duration_param: channel_time
      - type: summon_enemy
        data:
          enemy: armored_salam
          count_param: summon_count
          interval: 0.4
      - type: delay
        data:
          delay_param: channel_time
