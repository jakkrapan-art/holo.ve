# Boss. `name` is the display name; the sprite + id come from the file path
# (resources/enemy/forest01/boss/king_salam/king_salam.png). `wave` lists the
# waves this boss is eligible to spawn on; `scale` is the visual/hitbox size
# multiplier applied at spawn. Skills are inline (3 max by design); enemy
# skills are single-level, so desc uses concrete numbers (see enemy_skill.md).
name: King Salam
scale: 1.75
wave:
  - 5
stats:
  hp: 8000
  def: 5
  mDef: 5
  moveSpeed: 30
skill:
  - name: Adaptation
    cooldown: 20
    recovery: 0.2
    tags:
      - defense
      - self
    desc: "King Salam adapts his royal hide, reducing all damage he takes by 10% for 5 seconds."
    action:
      - type: target_self
      - type: apply_effect
        data:
          effect: damage_reduction_up
          target: targets
          value: 0.1
          duration: 5
          title: "Adaptation"
  - name: Slime Fluid
    cooldown: 30
    cast_time: 0.5
    recovery: 0.2
    tags:
      - debuff
      - attack_speed
      - aoe
    desc: "King Salam splashes his slime across a 7x7 area, coating units in Slime Fluid that slows their attack speed by 10% for 10 seconds."
    action:
      - type: apply_effect
        data:
          effect: slime_fluid
          target: towers_in_range
          range: 3
          value: 0.1
          duration: 10
  - name: King's Command
    cooldown: 40
    cast_time: 0.5
    recovery: 0.2
    tags:
      - invincible
      - summon
    desc: "King Salam stands his ground, invincible and untargetable for 2 seconds, then commands 10 Armored Salam to join the battle at his side."
    action:
      - type: target_self
      - type: apply_effect
        data:
          effect: invincible
          target: targets
          duration: 2
      - type: apply_effect
        data:
          effect: royal_command
          target: targets
          duration: 2
      - type: delay
        data:
          delay: 2
      - type: summon_enemy
        data:
          enemy: armored_salam
          count: 10
          interval: 0.2
