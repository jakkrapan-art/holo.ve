maxLevel: 3
towerClass: hero
generation: tempus
attackType: physic
evolutionCost: 1

# skill: "res://resources/database/skill/takanashi_kiara_skill.tres"
attack_sound: "hit_altare"
open_sound: "debut_altare"
evolve_sound: "evo_altare"

stats:
  - damage: 80
    attackRange: 1.0
    attackSpeed: 110
    mana: 120
    intialMana: 40
    critChance: 0
    critMultiplier: 1.5

  - damage: 140
    attackRange: 1.0
    attackSpeed: 110.0
    mana: 120
    intialMana: 40
    critChance: 0
    critMultiplier: 1.5

  - damage: 200
    attackRange: 1.0
    attackSpeed: 110.0
    mana: 120
    intialMana: 40
    critChance: 0
    critMultiplier: 1.5

skill:
  name: "Skill"
  desc: "Just a skill"
  actions:
    - type: find_multi_enemy
      data:
        width: 3
        height: 1
        cancel_when_empty: true
    - type: play_animation        # beat 1: clip scaled to 0.5s; impact lands ~0.4s
      data:
        animation: "skill_1"
        duration: 0.5
    - type: attack
      data:
        damage: 100
        damage_type: physic
    - type: clear_enemy
    - type: find_multi_enemy
      data:
        width: 1
        height: 3
        cancel_when_empty: false
    - type: play_animation        # beat 2: clip scaled to 1.0s; impact lands ~0.8s
      data:                        # pacing lives in duration — no trailing delay
        animation: "skill_2"
        duration: 1.0
    - type: attack
      data:
        damage: 150
        damage_type: magic
    - type: play_animation
      data:
        animation: "idle"

evolutionStat:
  damage: 300
  attackRange: 1.0
  attackSpeed: 110
  mana: 120
  intialMana: 40
  critChance: 50.0
  critMultiplier: 1.5


