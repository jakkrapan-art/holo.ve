# Boss. `name` is the display name; the sprite + id come from the file path
# (resources/enemy/forest01/boss/giant_boar/giant_boar.png). `wave` lists the
# waves this boss is eligible to spawn on. skill is inline (3 boss skills).
name: Giant Boar
scale: 2
wave:
  - 10
stats:
  hp: 20000
  def: 5
  mDef: 5
  moveSpeed: 100
  skillCount: 3
  buffCount: 3
skill:
  - name: Charge
    cooldown: 20
    recovery: 0.2
    desc: charge_desc
    action:
      - type: target_self
      - type: set_speed
        data:
          speed: 0
      - type: delay
        data:
          delay: 2
      - type: set_speed
        data:
          speed: 150
      - type: delay
        data:
          delay: 2
      - type: set_speed
        data:
          speed: 100
  - name: Thick Skin
    cooldown: 45
    recovery: 0.2
    desc: thick_skin_desc
    action:
      - type: target_self
      - type: apply_effect
        data:
          effect: armor_mult_up
          target: targets
          value: 7.5
          duration: 5
  - name: Scary Graze
    cooldown: 30
    recovery: 0.2
    desc: scary_graze_desc
    action:
      - type: target_self
      - type: effect_area
        data:
          effect: attack_mult_down
          value: 10           # percent scale (10 = -10% damage); same result as legacy 0.10 decimal
          duration: 3
          radius: 1
          affects: towers
