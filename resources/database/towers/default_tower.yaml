maxLevel: 3 # tower max level
towerClass: warrior # tower class (Assassin, Hero, Marksman, Robotic, SpellCaster, Warrior)
generation: tempus # tower generation (Myth, Tempus)
attackType: physic # physic | magic (1 tower 1 type ตาม design)
evolutionCost: 1 # ค่า evolution

attack_sound: "hit" # ชื่อเสียงที่ใช้ตอนโจมตี (enum ใน sound_database.gd VOICE_NAME)
open_sound: "open" # ชื่อเสียงที่ใช้ตอนเปิดตัว
evolve_sound: "" # optional evolve voice key (VOICE_NAME); empty = no evolve voice
# attack_vfx: "blue" # optional — ชื่อ VFX ตอนโจมตี (enum ใน attack_vfx.gd AttackVFXName); ไม่ใส่ = "default"

stats:
  - damage: 80 # ค่าพลังโจมตี
    attackRange: 2.0 # ระยะการตี (cell)
    attackSpeed: 80.0 # ความเร็วการโจมตี
    critChance: 15.0
    critMultiplier: 1.5
    mana: 120 # ค่า mana สูงสุด
    initialMana: 60 # ค่า mana เริ่มต้น

  - damage: 120
    attackRange: 2.0
    attackSpeed: 80.0
    critChance: 15.0
    critMultiplier: 1.5
    mana: 120
    initialMana: 60

  - damage: 180
    attackRange: 2.0
    attackSpeed: 80.0
    critChance: 15.0
    critMultiplier: 1.5
    mana: 120
    initialMana: 60

# ── Skill slots (ทรงใหม่) ────────────────────────────────────────────
# skills.active = Active Skill (auto-cast ตอน Energy เต็ม)
# skills.passive = Passive Skill (ยังไม่มี runtime — ใส่ null ไว้ก่อน)
skills:
  active:
    name: "Skill"
    names: ["Skill I", "Skill II", "Skill III"] # optional UI display names per tower level
    desc: "Just a skill with {damageBonus:percent} bonus" # tokenized display text: {param} / {param:percent} resolve from parameters; token-free text renders as-is
    icon: "" # optional — ว่างได้ ถ้ายังไม่มี icon
    # tags = ป้ายสรุปสกิลแบบผู้เล่นอ่าน (controlled registry)
    tags:
      - damage
      - attack
      - aoe
      - enemy
    # target_summary = สรุป target ระดับสกิลไว้โชว์ UI (บรรทัด AFFECTS ใน tooltip อ่าน team+shape)
    # เป็น display-only ทั้งชั้น — พฤติกรรมจริงมาจาก actions เท่านั้น
    # กติกาสรุป: ใช้ target ของเอฟเฟกต์เด่นที่ desc ขึ้นต้น = ตัวแรกใน effects (Director 2026-07-18)
    # target_team = ใครโดน ไม่ใช่ร่ายจากไหน — สกิลร่ายรอบตัวที่ตีศัตรู = enemy (เคส IO Spirits)
    # ใช้ block map เท่านั้น อย่าใช้ inline {...} (custom YAML parser support flow จำกัด)
    target_summary:
      target_team: enemy # self | enemy | ally | both
      target_type: enemy # tower | enemy | any (ยังไม่ถูกแสดงผล — field สำรอง)
      target_shape: area # single | area | global
    # effects = พิมพ์เขียวรายเอฟเฟกต์แนว Dota (เรียงเอฟเฟกต์เด่นก่อน) — ยังไม่มีโค้ดอ่าน ไว้รอ tooltip ละเอียดในอนาคต
    effects:
      - name: "Area Damage"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
    # recovery = ช่วงจบ (วินาที): หลัง action สุดท้ายจบ tower ค้างท่า/ไม่กลับไปตีต่อทันที
    # ตามโมเดล ตัว(cast_time = เวลาร่าย/เล่นท่า)/หาง(recovery) — ไม่ใส่ = default 0.2
    recovery: 0.2
    parameters:
      damageBonus:
        - 0.10
        - 0.15
        - 0.20
    actions:
      - type: find_multi_enemy
        data:
          width: 3
          height: 1
          # center_on_self: true  # optional — กล่องวางกึ่งกลางตัว tower แกนตรง ไม่หมุนตามเป้า
          #                       # (สกิลตีรอบตัว เช่น 3x3 ของ Calliope) ไม่ใส่ = กล่องพุ่งหาเป้าแบบเดิม
      - type: play_animation
        data:
          animation: "skill"
      - type: attack
        data:
          damage: 100
          damage_type: physic
          # ─────────────────────────────────────────────────────────────────
          # Phase 3 Block C — Skill Multiplier (สำหรับ skill tower เท่านั้น)
          #
          # damage_multiplier:
          #   - scalar  → ใช้ค่าเดียว ทุก level     เช่น 2.0 (200% Total Attack)
          #   - array   → ค่าแต่ละ level [L1, L2, L3]  เช่น [1.4, 1.5, 1.7]
          #
          # damage_type ถ้าไม่ใส่ → ใช้ tower.attackType (default ตาม design 1 tower 1 type)
          #
          # can_crit:
          #   - true (default) → skill roll crit ตามเลขของ tower
          #   - false           → skill ไม่ crit (เช่น skill Kiara ตามดีไซน์)
          #
          # hit_distribution: [r1, r2, ...]  ← multi-hit, แบ่ง 100% ของ final damage
          #   ⚠️ caution: ผลรวม ratio ต้อง = 1.0 ไม่งั้น push_warning
          #   ⚠️ ใช้ได้กับ skill ของ tower เท่านั้น (normal attack ไม่มี multi-hit)
          #
          # ตัวอย่าง 4-hit skill ความเสียหาย 200% รวม:
          #   - type: attack
          #     data:
          #       damage_multiplier: 2.0
          #       hit_distribution: [0.2, 0.2, 0.1, 0.5]   # รวม = 1.0 ✓
          #
          # ตัวอย่าง skill non-crit ที่ scale ตาม level:
          #   - type: attack
          #     data:
          #       damage_multiplier: [1.4, 1.5, 1.7]
          #       can_crit: false
          #
          # stack_bonus_effect + stack_bonus_per_stack_param_name:
          #   สกิลสเกลตาม stack (เช่น Soul ของ Calliope) — ตัวคูณเพิ่มขึ้น
          #   จำนวน stack ของ effect id นั้นบน tower x ค่าต่อ stack (อ่านสดตอนตี)
          #   ตัวอย่าง: stack_bonus_effect: "soul"
          #             stack_bonus_per_stack_param_name: "soulBonus"
          # ─────────────────────────────────────────────────────────────────
      - type: play_animation
        data:
          animation: "idle"
      # ─────────────────────────────────────────────────────────────────
      # COMBO SKILL (หลายท่าใน cast เดียว) — pattern แบบ "beat"
      #
      # 1 beat = play_animation(1 คลิป non-loop) + cast_time(วินาที) + effect ต่อท้าย
      #   • cast_time ยืด/ย่อคลิปให้พอดีเวลา → ดาเมจ/effect ลงที่ ~80% ของ cast_time
      #   • ชื่อคลิป: skill_1, skill_2, ... skill_N (ต้องมีใน SpriteFrames ของ .tscn, loop=false)
      #   • ท่าเชื่อม (เช่น ควงปืน) วาดไว้ "หัวคลิป" ของ beat ถัดไป — ไม่มีคลิป "pre" แยก
      #   • beat สุดท้ายปิดด้วย play_animation "idle" เสมอ (คืน speed ปกติ)
      #   • ห้ามต่อ delay หลัง play_animation ของ beat — คุมจังหวะที่ cast_time พอ
      #   • ท่าชาร์จ/ง้างก่อนฟัน วาดใส่หัวคลิป beat 1 (คีย์ cast_time ระดับสกิลถูกลบแล้ว)
      #   • ใช้ได้ทั้ง skills.active และ evolution_skills.active เหมือนกัน
      #
      # ตัวอย่าง 2 beat (ฟันดาบ → ควงปืนยิง) — ของจริงดู regis_altare.yaml:
      #   actions:
      #     - type: find_multi_enemy
      #       data:
      #         width: 3
      #         height: 1
      #     - type: play_animation        # beat 1: ดาเมจฟันลง ~0.4s
      #       data:
      #         animation: "skill_1"
      #         cast_time: 0.5
      #     - type: attack
      #       data:
      #         damage: 100
      #         damage_type: physic
      #     - type: clear_enemy
      #     - type: find_multi_enemy
      #       data:
      #         width: 1
      #         height: 3
      #     - type: play_animation        # beat 2: ท่าควงปืนอยู่หัวคลิปนี้, ยิงลง ~0.8s
      #       data:
      #         animation: "skill_2"
      #         cast_time: 1.0
      #     - type: attack
      #       data:
      #         damage: 150
      #         damage_type: magic
      #     - type: play_animation
      #       data:
      #         animation: "idle"
      # ─────────────────────────────────────────────────────────────────
      # AFTERSHOCK (ระเบิดตามหลัง ไม่บล็อกการตี) — ของจริงดู mori_calliope.yaml
      #
      #   วางไว้หลัง attack แรก: action นี้วางระเบิดแล้วจบ cast ทันที tower
      #   กลับไปตีต่อได้ระหว่างรอ ครบ delay แล้วพื้นที่เดิม (กึ่งกลางตำแหน่ง
      #   ตอน cast) ระเบิดซ้ำด้วยการหาเป้าใหม่สด — คีย์ damage/crit/stack_bonus
      #   ชุดเดียวกับ attack ใช้ในระเบิดได้หมด
      #
      #   - type: aftershock
      #     data:
      #       delay_param_name: "aftershockDelay"   # หรือใส่ delay: 0.5 ตรง ๆ
      #       width: 3
      #       height: 3
      #       damage_multiplier_param_name: "aftershockDamage"
      #       damage_type: physic
      #       stack_bonus_effect: "soul"
      #       stack_bonus_per_stack_param_name: "aftershockSoulBonus"
      # ─────────────────────────────────────────────────────────────────
      # CHANNEL (ร่ายค้าง ฟาดโซนเดิมซ้ำเป็นจังหวะ) — ของจริงดู ninomae_ina_nis.yaml
      #
      #   วางต่อจาก find_multi_enemy แรก: โซนล็อกที่จุดเล็งตอนเริ่มร่าย tower
      #   ค้าง (ไม่ตีปกติ) จน channel จบ แต่ละ tick หาเป้าใหม่สดในโซนเดิม
      #   ตีทั้งโซน — คีย์ damage/crit/effects ชุดเดียวกับ attack ใช้ได้หมด
      #   ยกเลิกกลางคัน (จบเวฟ) = หยุดฟาดทันที ไม่กิน Energy
      #
      #   - type: channel
      #     data:
      #       width: 3
      #       height: 3
      #       cast_time_param_name: "channelDuration"     # หรือ cast_time: 3.0 ตรง ๆ
      #       tick_interval_param_name: "tickInterval"    # หรือ tick_interval: 0.25 ตรง ๆ
      #       animation: "skill"                          # คลิปร่าย เล่นค้างตลอด channel
      #       damage_multiplier_param_name: "tickDamage"
      #       damage_type: magic
      #       can_crit: false
      #       effects:
      #         - effect: "stun"
      #           duration_param: "tickStun"
      # ─────────────────────────────────────────────────────────────────
      # ─────────────────────────────────────────────────────────────────
      # FIELD (โซนค้างรอบตัว ไม่บล็อกการตี) — ของจริงดู banzoin_hakka.yaml
      #
      #   วางต่อจาก find_multi_enemy แรก: โซนวางกลางตัว tower แล้วจบ cast
      #   ทันที (ไม่บล็อก เหมือน aftershock) tower กลับไปตีปกติต่อได้ระหว่าง
      #   โซนทำงานเอง นาน duration วินาที แต่ละ tick หาเป้าใหม่สดในกล่องรอบตัว
      #   ตี + ลง effect (เช่น slow) — คีย์ damage/crit/effects ชุดเดียวกับ
      #   attack ใช้ได้หมด; energy_refund_percent = คืน Energy % ตอนโซนหมดเวลา
      #   (จบธรรมชาติเท่านั้น); ยกเลิกกลางคัน (จบเวฟ) = หยุดทันที ไม่คืน
      #
      #   - type: field
      #     data:
      #       width: 3
      #       height: 3
      #       duration_param_name: "skillDuration"      # หรือ duration: 10.0 ตรง ๆ
      #       tick_interval_param_name: "tickInterval"  # หรือ tick_interval: 1.0 ตรง ๆ
      #       damage_multiplier_param_name: "skillDamage"
      #       damage_type: magic
      #       can_crit: false
      #       energy_refund_percent_param_name: "energyRefund"   # optional (ใช้ตอน evolve)
      #       effects:
      #         - effect: "move_speed_down"
      #           value_param: "slowEffect"
      #           duration: 1.5
  passive: null

# evolutionStat = stat ตอน evolve (block เดียว ไม่ใช่ array)
evolutionStat:
  damage: 240
  attackRange: 2.0
  attackSpeed: 100.0
  critChance: 50.0
  critMultiplier: 1.5
  mana: 120
  initialMana: 80

# evolution_skills = สกิลร่างวิวัฒน์ (ทรงเดียวกับ skills) — optional
evolution_skills:
  active:
    name: "Evolved Skill"
    desc: "Just a stronger skill with {damageBonus:percent} bonus"
    icon: ""
    tags:
      - damage
      - attack
      - aoe
      - enemy
    target_summary:
      target_team: enemy
      target_type: enemy
      target_shape: area
    effects:
      - name: "Area Damage"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
    recovery: 0.2 # ช่วงจบ (วินาที) — ดูคอมเมนต์ที่ skills.active
    parameters:
      damageBonus:
        - 0.30
    actions:
      - type: find_multi_enemy
        data:
          width: 3
          height: 3
      - type: play_animation
        data:
          animation: "skill"
      - type: attack
        data:
          damage_multiplier: 2.0
          damage_type: physic
      - type: play_animation
        data:
          animation: "idle"
  passive: null
