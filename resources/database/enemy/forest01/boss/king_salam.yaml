# Boss. `name` is the display name; the sprite + id come from the file path
# (resources/enemy/forest01/boss/king_salam/king_salam.png). `wave` lists the
# waves this boss is eligible to spawn on. skill is inline (3 boss skills).
name: King Salam
scale: 1.75
wave:
  - 5
stats:
  hp: 8000
  def: 5
  mDef: 5
  moveSpeed: 30
  skillCount: 3
  buffCount: 3
skill:
  - name: Adaptation
    cooldown: 20
    desc: ลดดาเมจที่ได้รับ 10%
    action:
      - type: target_self
      - type: apply_effect
        data:
          effect: damage_reduction_up
          target: targets
          value: 0.1
          duration: 5
  - name: Slime Fluid
    cooldown: 40
    desc: "สร้าง Aura รอบตัว ลดความเร็วการโจมตี 10% ของป้อมในรัศมี 5 ช่อง"
    action:
      - type: target_self
      - type: effect_area
        data:
          effect: attack_speed_down
          value: 0.1          # decimal AS scale (0.1 = -10%); positive, system negates
          duration: 5         # aura lifetime; debuff lasts while inside
          radius: 5
          affects: towers
  - name: King's Command
    cooldown: 30
    desc: "มอนเตอร์นรัศมีการบัฟจะได้รับ Move Speed เพิ่มขึ้น 10%  (Non-stackable)  Duration : 5 Sec ในระยะ 5 ช่อง"
    action:
      - type: target_self
      - type: effect_area
        data:
          effect: move_speed_up
          value: 0.1
          duration: 5
          radius: 5
          affects: enemies
