maxLevel: 3
towerClass: hero
generation: tempus
attackType: physic
evolutionCost: 1

attack_sound: "hit_altare"
open_sound: "debut_altare"
evolve_sound: "evo_altare"

stats:
  - damage: 80
    attackRange: 1.0
    attackSpeed: 110.0
    critChance: 0
    critMultiplier: 1.5
    mana: 120
    initialMana: 40

  - damage: 140
    attackRange: 1.0
    attackSpeed: 110.0
    critChance: 0
    critMultiplier: 1.5
    mana: 120
    initialMana: 40

  - damage: 200
    attackRange: 1.0
    attackSpeed: 110.0
    critChance: 0
    critMultiplier: 1.5
    mana: 120
    initialMana: 40

# Active Skill — "Gun and Blade" combo (2 beats, both physic).
# Reference example for: combo beat model + armor-shred debuff + guaranteed crit.
skills:
  active:
    name: "Gun and Blade"
    names: ["Gun and Blade I", "Gun and Blade II", "Gun and Blade III"]
    desc: "Altare strikes twice with his Gun Blade. A forward slash across a 3x1 tile area deals {beat1Damage:percent} weapon damage and reduces armor by {armorShred:percent} for {shredDuration}s, then a gun volley down a 1x3 lane deals {beat2Damage:percent} weapon damage with a guaranteed critical."
    icon: ""
    tags:
      - damage
      - weapon
      - aoe
      - combo
      - debuff
    target_summary:
      target_team: enemy
      target_type: enemy
      target_shape: area
    effects:
      - name: "Gun Blade Slash"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
      - name: "Armor Break"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
      - name: "Gun Volley"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
    recovery: 0.2 # post-cast hold (s) before resuming attack — see default_tower.yaml
    parameters:
      beat1Damage:
        - 1.5
        - 1.75
        - 2.25
      beat2Damage:
        - 1.2
        - 1.4
        - 1.6
      armorShred: 0.05
      shredDuration: 2.0
    actions:
      - type: find_multi_enemy        # beat 1: slash, 3 wide x 1 deep
        data:
          width: 3
          height: 1
      - type: play_animation
        data:
          animation: "skill_1"
          cast_time: 0.5
      - type: attack
        data:
          damage_multiplier_param_name: "beat1Damage"
          damage_type: physic
          effects:
            - effect: "armor_mult_down"         # positive magnitude in YAML; system negates
              value_param: "armorShred"
              duration_param: "shredDuration"
      - type: clear_enemy
      - type: find_multi_enemy        # beat 2: gun line, 1 wide x 3 deep
        data:
          width: 1
          height: 3
          cancel_when_empty: false    # combo beat: whiff (play anim, no dmg), don't cancel
      - type: play_animation
        data:
          animation: "skill_2"
          cast_time: 1.0
      - type: attack
        data:
          damage_multiplier_param_name: "beat2Damage"
          damage_type: physic
          force_crit: true                       # guaranteed critical
      - type: play_animation
        data:
          animation: "idle"
  passive: null

evolutionStat:
  damage: 300
  attackRange: 1.0
  attackSpeed: 110.0
  critChance: 50.0
  critMultiplier: 1.5
  mana: 120
  initialMana: 40

