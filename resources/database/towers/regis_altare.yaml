skill:
  name: "Skill"
  desc: "Just a skill"
  actions:
    - type: find_multi_enemy
      data:
        width: 3
        height: 1
        cancel_when_empty: true
    - type: play_animation
      data:
        animation: "skill_1"
    - type: attack
      data:
        damage: 100
        damage_type: physical
    - type: clear_enemy
