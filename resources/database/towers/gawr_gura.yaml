      - persistent
    target_summary:
      target_team: enemy
      target_type: tower
      target_shape: area
    effects:
      - name: "Storm Wave Damage"
        target:
          target_team: enemy
          target_type: tower
          target_shape: area
    cast_time: 0.5
    parameters:
      damageMultiplier:
        - 2.0
    actions:
