maxLevel: 3
towerClass: SpellCaster
generation: myth
attackType: magic
evolutionCost: 1

attack_sound: "hit_ina"
open_sound: "debut_ina"
evolve_sound: "evo_ina"

# Normal attack - "Wet Nib" ink stroke. Homing bullet, damage lands on hit.
# The shader owns the palette; only geometry/pacing is authored here.
attack:
  mode: projectile
  projectile: "res://resources/combat/bullets/ina_normal_bullet.tscn"
  vfx_shader: "res://resources/tower/hololive/en_branch/myth_gen/inanis/normal_effect/ina_ink_stroke.gdshader"
  speed: 6.0          # tiles/sec
  size: 184           # stroke height px (scales sprite + hitbox); quad is 154x64
  burst: 1            # one stroke - no cosmetic rounds
  impact: true        # opt in to the on-hit beat (impact_size/impact_time keep their defaults)

stats:
  - damage: 140
    attackRange: 3.0
    attackSpeed: 60
    mana: 100
    initialMana: 60
    critChance: 0
    critMultiplier: 1.5

  - damage: 160
    attackRange: 3.0
    attackSpeed: 60
    mana: 100
    initialMana: 60
    critChance: 0
    critMultiplier: 1.5

  - damage: 200
    attackRange: 3.0
    attackSpeed: 60
    mana: 100
    initialMana: 60
    critChance: 0
    critMultiplier: 1.5

# Active Skill - "Tentacle": aimed 1x3 tentacle lash with a stun.
skills:
  active:
    name: "Tentacle"
    names: ["Tentacle I", "Tentacle II", "Tentacle III"]
    desc: "Ina'nis commands a tentacle of the Ancient One to lash the 1x3 line in front of her, dealing {skillDamage:percent} magic damage and stunning every enemy hit for {stunDuration}s."
    icon: ""
    tags:
      - damage
      - magic
      - aoe
      - stun
      - duration
    target_summary:
      target_team: enemy
      target_type: enemy
      target_shape: area
    effects:
      - name: "Tentacle Lash"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
    recovery: 0.2 # post-cast hold (s) before resuming attack - see default_tower.yaml
    parameters:
      skillDamage:
        - 2.0
        - 2.4
        - 3.0
      stunDuration: 1.5
    actions:
      - type: find_multi_enemy
        data:
          width: 1
          height: 3
      - type: play_animation
        data:
          animation: "skill"
          cast_time: 0.5
      - type: attack
        data:
          damage_multiplier_param_name: "skillDamage"
          damage_type: magic
          effects:
            - effect: "stun"
              duration_param: "stunDuration"
      - type: play_animation
        data:
          animation: "idle"
  passive: null

evolutionStat:
  damage: 500
  attackRange: 3.0
  attackSpeed: 60
  mana: 100
  initialMana: 60
  critChance: 50.0
  critMultiplier: 1.5

# Evolved Active Skill - the game's first "channel" pattern skill: Ina'nis
# locks the 3x3 zone in front of her and strikes it 12 times over 3 seconds
# (every 0.25s), stunning enemies caught inside on every strike. She is busy
# for the whole channel (no auto-attack). The ticks do not crit on their own
# (can_crit: false below); the evolved BASE stat keeps critChance 50 for her
# normal attacks (stat-consistency verdict, Director 2026-07-14). Superseded in
# part 2026-07-19: the SpellCaster synergy opens this gate for its holders, so
# the ticks DO crit while that trait is active - intended, do not re-block it.
evolution_skills:
  active:
    name: "Book of Ancient Ones"
    desc: "Ina'nis opens the Book of Ancient Ones and channels its power for {channelDuration} seconds, striking the 3x3 area in front of her every {tickInterval} seconds. Each strike deals {tickDamage:percent} magic damage and stuns enemies caught in the zone for {tickStun}s."
    icon: ""
    tags:
      - damage
      - magic
      - aoe
      - stun
      - channel
      - duration
    target_summary:
      target_team: enemy
      target_type: enemy
      target_shape: area
    effects:
      - name: "Ancient Onslaught"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
    recovery: 0.2 # post-cast hold (s) before resuming attack - see default_tower.yaml
    parameters:
      tickDamage: 1.5
      tickStun: 1.0
      channelDuration: 3.0
      tickInterval: 0.25
    actions:
      - type: find_multi_enemy       # cast-start aim: cancels (Energy kept) if empty; publishes area_center
        data:
          width: 3
          height: 3
      - type: channel                # BLOCKS for channelDuration; re-strikes the locked zone every tick
        data:
          width: 3
          height: 3
          cast_time_param_name: "channelDuration"
          tick_interval_param_name: "tickInterval"
          animation: "skill"
          damage_multiplier_param_name: "tickDamage"
          damage_type: magic
          can_crit: false            # ticks do not crit on their own; the SpellCaster synergy overrides this gate for holders
          effects:
            - effect: "stun"
              duration_param: "tickStun"
      - type: play_animation
        data:
          animation: "idle"
  passive: null
