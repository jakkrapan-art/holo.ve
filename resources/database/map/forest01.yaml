mapName: "forest01"

# ============================================================================
# Stage Modifier - ปรับสเตตัสมอน "ทั้งสเตจ" (มีผลทุก wave ในแมพนี้)
# ตอนนี้เว้นว่าง [] ไว้ก่อน กลไกพร้อมแล้ว แต่รอ UI โชว์ modifier ให้ผู้เล่นเห็นก่อน
#
# วิธีใช้: ลบ [] ออก แล้วก๊อปบล็อกตัวอย่างข้างล่างมาวาง (ลบ # หน้าบรรทัดที่อยากใช้)
# *** ระวังเรื่องการเว้นวรรค (เว้น 2 ช่องในแต่ละชั้น เหมือนตัวอย่าง) ***
#
# ตัวอย่าง (dummy) - แก้ตัวเลขได้เลย:
# stageModifiers:
#   - stat: hp              # เลือดมอน
#     op: mult              # แบบคูณ
#     value: 2              # เลือด x2   (ใส่หลายตัว = เอาตัวคูณมาบวกกัน เช่น x2 + x1.5 -> x3.5)
#   - stat: moveSpeed       # ความเร็วเดิน
#     op: percent           # แบบเปอร์เซ็นต์
#     value: 20             # เร็วขึ้น 20%
#
# ตารางค่าที่ปรับได้  ->  op (วิธีปรับ) ที่ใช้คู่กัน:
#   hp               ->  mult                (คูณเลือด)
#   def              ->  flat | percent      (เกราะกายภาพ: บวกตรง ๆ / เป็น %)
#   mDef             ->  flat | percent      (เกราะเวท)
#   moveSpeed        ->  mult | percent      (ความเร็ว)
#   damageReduction  ->  add                 (ลดดาเมจที่รับ 0..0.9  เช่น 0.1 = ลด 10%)
# ============================================================================
stageModifiers: []

# ----------------------------------------------------------------------------
# จังหวะการเกิดมอน (spawn timing)
# เพื่อกันไม่ให้มอนยัง spawn อยู่ "หลังเวลานับถอยหลัง (duration) หมด" ใช้สูตร spawnInterval <= (duration - startAt) / count
# ----------------------------------------------------------------------------
waves:
  - duration: 60  # wave1
    # waveModifiers ใช้เหมือน stageModifiers แต่มีผลเฉพาะ wave นี้ wave เดียว (เคสพิเศษ) เช่น:
    # waveModifiers:
    #   - stat: hp
    #     op: mult
    #     value: 1.5
    groupList:
      - enemy: salam
        count: 60
        spawnInterval: 1                    #   spawnInterval = วินาทีระหว่างการเกิดมอนแต่ละตัวในกลุ่ม
        startAt: 0                          #   startAt = วินาทีที่เริ่ม spawn มอนตัวแรกในกลุ่ม (นับจากเริ่ม wave)       

  - duration: 60  # wave2
    groupList:
      - enemy: rolling_stone
        count: 60
        spawnInterval: 1
        startAt: 0

  - duration: 60  # wave3
    groupList:
      - enemy: goblin
        count: 60
        spawnInterval: 1
        startAt: 0
      - enemy: armored_goblin
        count: 10
        spawnInterval: 5
        startAt: 10

  - duration: 60  # wave4
    groupList:
      - enemy: armored_salam
        count: 60
        spawnInterval: 1
        startAt: 0
      - enemy: armored_goblin
        count: 10
        spawnInterval: 5
        startAt: 0

  - duration: 60  # wave5
    boss: true

  - duration: 60  # wave6
    groupList:
      - enemy: baby_garlic
        count: 60
        spawnInterval: 1
        startAt: 0

  - duration: 60  # wave7
    groupList:
      - enemy: baby_garlic
        count: 60
        spawnInterval: 1
        startAt: 0
      - enemy: wild_boar
        count: 10
        spawnInterval: 6
        startAt: 0

  - duration: 60  # wave8
    groupList:
      - enemy: wild_boar
        count: 60
        spawnInterval: 1
        startAt: 0
      - enemy: flying_flower
        count: 10
        spawnInterval: 6
        startAt: 0

  - duration: 60  # wave9
    groupList:
      - enemy: wild_boar
        count: 60
        spawnInterval: 1
        startAt: 0
      - enemy: flying_flower
        count: 10
        spawnInterval: 6
        startAt: 0
      - enemy: armored_boar
        count: 5
        spawnInterval: 12
        startAt: 0

  - duration: 60  # wave10
    boss: true
