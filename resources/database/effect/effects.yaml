# verdict, PR #36). No self-expiry; the passive resets it on crit / wave end.
bull_eyes:
  name: "Bull Eyes"
  desc: "Josuiji Shinri's focus sharpens, increasing his critical chance by {value}."
  icon: "ui_asset/effects/buff_generic.png"
  category: buff
  host: tower
