id: tempus
name: "Tempus"
kind: generation
type: quest
rarity: common
# First quest-type synergy: reaching a unit threshold opens a Guild Mission
# (cumulative kill goal); completing it unlocks a reward that STACKS with the
# lower tiers. Kill count starts when Tempus first activates (2 units) and
# persists across waves. Behaviour: SynergyEffectQuestTempus.
effect: quest_kill_tempus
thresholds: [2, 4, 6]
parameters:
  # Cumulative kills required for each tier's Guild Mission (per-tier, scaling).
  mission_kills: [100, 200, 400]
  # T1 reward. attack_mult / magic_mult are PERCENT-scale (20 = +20%).
  atk_bonus: 20
  # T2 reward. attack_speed is DECIMAL-scale (0.5 = +50%).
  as_bonus: 0.5
  # T3 reward: every field unit regains energy_percent of max Energy each
  # energy_interval seconds.
  energy_percent: 0.1
  energy_interval: 5
desc: "The Tempus guild fights as one - clear each Guild Mission and they grow stronger together."
# One line per tier (qualitative). {mission_kills} is the per-tier scaling value
# (highlighted); reward magnitudes read scalar params so the text cannot drift
# from the applied effect. :percent renders a decimal-scale value as N%.
tier_effects:
  - "Guild Mission - defeat {mission_kills} enemies. Reward: Tempus units gain +{atk_bonus}% Physical and Magic Attack."
  - "Guild Mission - defeat {mission_kills} enemies. Reward: Tempus units gain +{as_bonus:percent} Attack Speed."
  - "Guild Mission - defeat {mission_kills} enemies. Reward: all units regain {energy_percent:percent} max Energy every {energy_interval}s."
