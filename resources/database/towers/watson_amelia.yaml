maxLevel: 3
towerClass: Marksman
generation: myth
attackType: physic
evolutionCost: 1

attack_sound: "hit_amelia"
open_sound: "debut_amelia"
evolve_sound: "evo_amelia"

# Normal attack = homing pistol-bullet burst (Soft Glow). Damage lands ONCE per
# attack (the burst is visual); speed/size/burst/glow_softness are artist-tunable.
attack:
  mode: projectile
  projectile: "res://resources/combat/bullets/watson_amelia_bullet.tscn"
  vfx_shader: "res://resources/tower/hololive/en_branch/myth_gen/amelia/normal_effect/amelia_bullet.gdshader"
  speed: 9.0          # tiles/sec
  size: 84            # bullet diameter px (scales sprite + hitbox)
  burst: 3            # rounds per shot (visual only)
  glow_softness: 0.3  # 0 = crisp edge, higher = fuzzier halo

stats:
  - damage: 60
    attackRange: 5.0
    attackSpeed: 120
    mana: 100
    initialMana: 80
    critChance: 0
    critMultiplier: 1.5

  - damage: 120
    attackRange: 5.0
    attackSpeed: 120
    mana: 100
    initialMana: 80
    critChance: 0
    critMultiplier: 1.5

  - damage: 240
    attackRange: 5.0
    attackSpeed: 120
    mana: 100
    initialMana: 80
    critChance: 0
    critMultiplier: 1.5

skills:
  active:
    name: "Time Traveler"
    names: ["Time Traveler I", "Time Traveler II", "Time Traveler III"]
    desc: "Watson Amelia invokes the Clock of Time, increasing her own attack speed for 4 seconds."
    desc_template: "Watson Amelia invokes the Clock of Time, increasing her own attack speed by {attackSpeedBuff:percent} for 4 seconds."
    icon: ""
    tags:
      - buff
      - attack_speed
      - self
    target_summary:
      target_team: self
      target_type: tower
      target_shape: single
    effects:
      - name: "Attack Speed Buff"
        target:
          target_team: self
          target_type: tower
          target_shape: single
    # cast_time: 0.0   # DISABLED — skill timing now lives in play_animation `duration`.
    #                  # cast_time = idle hold BEFORE the cast (no skill anim); kept for team ref / possible future use.
    recovery: 0.2 # post-cast hold (s) before resuming attack — see default_tower.yaml
    parameters:
      attackSpeedBuff:
        - 0.10
        - 0.15
        - 0.20
    actions:
      - type: "play_animation"
        data:
          animation: "skill"
          duration: 0.5   # skill clip scaled to 0.5s; effect lands ~0.4s (tune in-engine)
      - type: "play_effect"
        data:
          effect_script: "res://resources/tower/hololive/en_branch/myth_gen/amelia/skill_effect/amelia_skill_effect.gd"
      - type: "apply_effect"
        data:
          effect: "attack_speed_up"
          target: "self"
          value_param: "attackSpeedBuff"
          duration: 4.0
          title: "Time Traveler"
      - type: "play_animation"
        data:
          animation: "idle"
  passive: null

evolutionStat:
  damage: 350
  attackRange: 5.0
  attackSpeed: 140
  mana: 120
  initialMana: 80
  critChance: 50.0
  critMultiplier: 1.5

evolution_skills:
  active:
    name: "Elementary my dear"
    desc: "Watson Amelia invokes the Clock of Time, increasing attack speed for herself and nearby towers within 1 tile, and granting herself bonus critical chance for 4 seconds."
    desc_template: "Watson Amelia invokes the Clock of Time, increasing attack speed by {attackSpeedBuff:percent} for herself and nearby towers within 1 tile, and granting herself {critChanceBuff}% critical chance for 4 seconds."
    icon: ""
    tags:
      - buff
      - attack_speed
      - crit_rate
      - aoe
      - self
      - ally
    target_summary:
      target_team: ally
      target_type: tower
      target_shape: area
    effects:
      - name: "Area Attack Speed Buff"
        target:
          target_team: ally
          target_type: tower
          target_shape: area
        include_self: true
      - name: "Self Critical Rate Buff"
        target:
          target_team: self
          target_type: tower
          target_shape: single
    # cast_time: 0.0   # DISABLED — skill timing now lives in play_animation `duration`.
    #                  # cast_time = idle hold BEFORE the cast (no skill anim); kept for team ref / possible future use.
    recovery: 0.2 # post-cast hold (s) before resuming attack — see default_tower.yaml
    parameters:
      attackSpeedBuff:
        - 0.50
      critChanceBuff:
        - 100.0
    actions:
      - type: "play_animation"
        data:
          animation: "skill"
          duration: 0.5   # skill clip scaled to 0.5s; effect lands ~0.4s (tune in-engine)
      - type: "play_effect"
        data:
          effect_script: "res://resources/tower/hololive/en_branch/myth_gen/amelia/skill_effect/amelia_evo_skill_effect.gd"
      - type: "apply_effect"
        data:
          effect: "attack_speed_up"
          target: "allies_in_range"
          value_param: "attackSpeedBuff"
          duration: 4.0
          range: 1
          title: "Elementary My Dear - Attack Speed"
      - type: "apply_effect"
        data:
          effect: "crit_chance_up"
          target: "self"
          value_param: "critChanceBuff"
          duration: 4.0
          title: "Elementary My Dear - Critical Chance"
      - type: "play_animation"
        data:
          animation: "idle"
  passive: null
