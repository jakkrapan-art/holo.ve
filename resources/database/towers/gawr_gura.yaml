maxLevel: 3
towerClass: SpellCaster
generation: myth
attackType: magic
evolutionCost: 1

attack_sound: "hit_gura"
open_sound: "debut_gura"
attack_vfx: "blue" # ชื่อ VFX ที่ใช้ตอนโจมตี (เป็น enum ใน attack_vfx.gd AttackVFXName)

stats:
  - damage: 80
    attackRange: 1.0
    attackSpeed: 80
    mana: 120
    manaRegen: 10
    intialMana: 60
    critChance: 0
    critMultiplier: 1.5

  - damage: 120
    attackRange: 1.0
    attackSpeed: 80
    mana: 120
    manaRegen: 10
    intialMana: 60
    critChance: 0
    critMultiplier: 1.5

  - damage: 180
    attackRange: 1.0
    attackSpeed: 80
    mana: 120
    manaRegen: 10
    intialMana: 60
    critChance: 0
    critMultiplier: 1.5

skills:
  active:
    name: "Atlantis Trident"
    names: ["Atlantis Trident I", "Atlantis Trident II", "Atlantis Trident III"]
    desc: "Gawr Gura summons crashing waves of the Atlantis Trident around herself.\nNote: Gawr Gura does not gain Energy while this skill is active."
    desc_template: "Gawr Gura wields the Trident of Atlantis to summon four storm waves within one tile around her for 10 seconds. Each wave deals {damageMultiplier:percent} damage per hit and stuns foes for 0.1s.\nNote: Gawr Gura does not gain Energy while this skill is active."
    icon: ""
    tags:
      - damage
      - projectile
      - aoe
      - stun
      - enemy
      - persistent
    target_summary:
      target_team: enemy
      target_type: tower
      target_shape: area
    effects:
      - name: "Storm Wave Damage"
        target:
          target_team: enemy
          target_type: tower
          target_shape: area
    cast_time: 0.5
    parameters:
      damageMultiplier:
        - 1.2
        - 1.3
        - 1.5
    actions:
      - type: "create_circle_projectile"
        data:
          # circle_radius: orbit radius in tile units (1.0 = projectiles trace a circle 1 tile from the tower).
          # Increase to push waves further from the tower; decrease to tighten.
          circle_radius: 1.25
          angular_speed: 180.0
          initial_angle: 0.0
          angle_offset: 90.0
          lifetime: 10.0
          count: 4
          damage_multiplier_param_name: "damageMultiplier"
          damage_type: "magic"
          # Scale multipliers on the projectile root (visual + collision).
          # 1.0 keeps the .tscn default size; raise both to widen each wave's hitbox.
          projectile_size_w: 1
          projectile_size_h: 1
          status_effects:
            - type: "stun"
              duration: 0.1
  passive: null

evolutionStat:
  damage: 240
  attackRange: 1.0
  attackSpeed: 100
  mana: 120
  manaRegen: 10
  intialMana: 80
  critChance: 50.0
  critMultiplier: 1.5

evolution_skills:
