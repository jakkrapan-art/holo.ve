# Effect registry - the single source of truth for every buff/debuff/mark id.
# Skills reference an id and supply value/duration; identity, category, icon,
# and stacking live here. Designers tune numbers in skill YAML; artists swap
# icons by editing the icon path here (assets under resources/ui_asset/effects/).
#
# Fields per entry:
#   name       display name (player-facing, English - see game_copy.md)
#   desc       player-facing tooltip line (game_copy.md voice). Numbers are
#              NEVER typed in: the {value} token resolves to the real applied
#              magnitude (stacks included) at display time.
#   icon       texture path relative to resources/
#   category   buff | debuff | mark
#   host       tower | enemy (documentation; not enforced at runtime)
#   kind       stat or behavior kind - see effect_types.gd KIND_FROM_STRING
#   stack      refresh (default) | stack (Batrider-style stack counter)
#   max_stacks stack rule only; 0 = unlimited
#   duration   default seconds when the skill omits it; 0 = no self-expiry
#   lifetime   wave (default; cleared at wave end) | board (synergy only)
#   negate     true = apply as a reduction while the authored magnitude stays
#              positive; for themed debuff ids without the _down suffix
#   params     behavior extras (interval, tint_modulate, max_hp_percent, ...)
#
# Unit conventions (must match effect_types.gd):
#   attack_speed / move_speed  decimal (0.5 = +50%)
#   attack_mult / magic_mult   percent (10 = +10%)
#   armor_mult / marmor_mult   decimal (0.05 = +5%)
#   crit_chance                percent points
#   damage_amp / damage_reduction  decimal
# Sign rule: designers ALWAYS enter positive magnitudes; ids ending in _down
# are negated by the system (EffectDef.negate_value).
#
# NOTE: no enemy attack-speed debuff exists by design - enemies never attack
# (Director decision 2026-07-02). Do not add one.

