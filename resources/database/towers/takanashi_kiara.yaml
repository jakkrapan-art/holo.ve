maxLevel: 3
towerClass: warrior
generation: myth
attackType: physic
evolutionCost: 1

# skill: "res://resources/database/skill/takanashi_kiara_skill.tres"
attack_sound: "hit_kiara"
open_sound: "debut_kiara"
evolve_sound: "evo_kiara"

stats:
  - damage: 100
    attackRange: 1.0
    attackSpeed: 90.0
    mana: 50
    manaRegen: 10
    intialMana: 10
    critChance: 0
    critMultiplier: 1.5

  - damage: 120
    attackRange: 1.0
    attackSpeed: 90.0
    mana: 50
    manaRegen: 10
    intialMana: 10
    critChance: 0
    critMultiplier: 1.5

  - damage: 160
    attackRange: 1.0
    attackSpeed: 90.0
    mana: 50
    manaRegen: 10
    intialMana: 10
    critChance: 0
    critMultiplier: 1.5

skill:
  name: "Kiara ฟันดาบเปลวเพลิง"
  desc: "สร้างความเสียหายกายภาพ 140% / 150% / 170% (ตามเลเวล) แก่ศัตรูในระยะ 3×1"
  actions:
    - type: find_multi_enemy
      data:
        width: 3
        height: 1
    - type: play_animation
      data:
        animation: "skill"
    - type: attack
      data:
        # Skill Multiplier ต่อ level — uses tower.attackType (physic) by default
        damage_multiplier: [1.4, 1.5, 1.7]
        can_crit: false   # Kiara ตามดีไซน์: skill ไม่สามารถ crit
    - type: play_animation
      data:
        animation: "idle"

evolutionStat:
  damage: 300
  attackRange: 1.0
  attackSpeed: 110
  mana: 80
  manaRegen: 10
  intialMana: 40
  critChance: 50.0
  critMultiplier: 1.5

# Evolution skill — overrides base skill when tower is evolved
evolution_skill:
  name: "Kiara ฟันดาบเปลวเพลิงสุดยอด"
  desc: "สร้างความเสียหายกายภาพ 300% แก่ศัตรูในระยะ 6×3"
  actions:
    - type: find_multi_enemy
      data:
        width: 3
        height: 6
    - type: play_animation
      data:
        animation: "skill"
    - type: attack
      data:
        damage_multiplier: 3.0   # 300% physic damage (uses tower.attackType)
        can_crit: false
    - type: play_animation
      data:
        animation: "idle"


