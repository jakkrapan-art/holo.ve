maxLevel: 3
towerClass: warrior
generation: tempus
attackType: physic
evolutionCost: 1

attack_sound: "hit_hakka"
open_sound: "debut_hakka"
evolve_sound: "evo_hakka"

stats:
  - damage: 130
    attackRange: 1.0
    attackSpeed: 80.0
    mana: 120
    initialMana: 80
    critChance: 0
    critMultiplier: 1.5

  - damage: 150
    attackRange: 1.0
    attackSpeed: 80.0
    mana: 120
    initialMana: 80
    critChance: 0
    critMultiplier: 1.5

  - damage: 200
    attackRange: 1.0
    attackSpeed: 80.0
    mana: 120
    initialMana: 80
    critChance: 0
    critMultiplier: 1.5

# Active Skill - "Exocirst Field": a persistent purifying zone centered on
# Hakka. It is the first "field" execution pattern - planted
# non-blocking (Hakka keeps auto-attacking) and ticks physical damage + slow to
# enemies inside every tickInterval for skillDuration seconds. Zone VFX =
# effect_script on the field action (ofuda orbit + spirit vortex, persistent
# for the whole duration); the red debug rects are authored off (show_area).
skills:
  active:
    name: "Exocirst Field"
    names: ["Exocirst Field I", "Exocirst Field II", "Exocirst Field III"]
    desc: "Banzoin Hakka conjures a purifying field in a 3x3 area around him for {skillDuration} seconds; enemies within take {skillDamage:percent} weapon damage and are slowed by {slowEffect:percent} every second they remain inside."
    icon: ""
    tags:
      - damage
      - weapon
      - aoe
      - persistent
      - debuff
      - duration
    target_summary:
      target_team: enemy
      target_type: enemy
      target_shape: area
    effects:
      - name: "Purifying Field"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
    recovery: 0.2 # post-cast hold (s) before resuming attack - see default_tower.yaml
    parameters:
      skillDamage:
        - 0.4
        - 0.6
        - 1.0
      skillDuration: 10.0
      slowEffect: 0.15
      tickInterval: 1.0
    actions:
      - type: find_multi_enemy
        data:
          width: 3
          height: 3
          center_on_self: true        # cast gate: box centered on Hakka
          show_area: false            # zone VFX shows the area - no red debug box
      - type: play_animation
        data:
          animation: "skill"
          cast_time: 0.5
      - type: field                    # plant the zone and return - Hakka keeps attacking
        data:
          width: 3
          height: 3
          duration_param_name: "skillDuration"
          tick_interval_param_name: "tickInterval"
          damage_multiplier_param_name: "skillDamage"
          damage_type: physic
          crit_rule: no_crit   # no_crit / use_crit_chance / guaranteed_crit
          show_area: false            # per-tick red debug box off (VFX replaces it)
          effect_script: "res://resources/tower/holostars/en_branch/tempus_gen/hakka/skill_effect/hakka_field_effect.gd"
          effects:
            - effect: move_speed_down       # per-tick slow (refresh; ~1 tick lag on leave)
              value_param: "slowEffect"
              duration: 1.5
      - type: play_animation
        data:
          animation: "idle"
  passive: null

evolutionStat:
  damage: 280
  attackRange: 1.0
  attackSpeed: 80.0
  mana: 120
  initialMana: 80
  critChance: 50.0
  critMultiplier: 1.5

# Evolved Active Skill - larger 5x5 field, stronger tick, and on natural expiry
# Hakka recovers energyRefund of his max Energy (evolve-only refund).
evolution_skills:
  active:
    name: "Obey my omen, in hymns allure"
    desc: "Banzoin Hakka unleashes a greater purifying field across a 5x5 area for {skillDuration} seconds; enemies within take {skillDamage:percent} weapon damage and are slowed by {slowEffect:percent} every second they remain, and when the field fades he recovers {energyRefund:percent} of his maximum Energy."
    icon: ""
    tags:
      - damage
      - weapon
      - aoe
      - persistent
      - debuff
      - duration
    target_summary:
      target_team: enemy
      target_type: enemy
      target_shape: area
    effects:
      - name: "Purifying Field"
        target:
          target_team: enemy
          target_type: enemy
          target_shape: area
    recovery: 0.2 # post-cast hold (s) before resuming attack - see default_tower.yaml
    parameters:
      skillDamage: 1.5
      skillDuration: 10.0
      slowEffect: 0.15
      tickInterval: 1.0
      energyRefund: 0.2
    actions:
      - type: find_multi_enemy
        data:
          width: 5
          height: 5
          center_on_self: true        # cast gate: box centered on Hakka
          show_area: false            # zone VFX shows the area - no red debug box
      - type: play_animation
        data:
          animation: "skill"
          cast_time: 0.5
      - type: field
        data:
          width: 5
          height: 5
          duration_param_name: "skillDuration"
          tick_interval_param_name: "tickInterval"
          damage_multiplier_param_name: "skillDamage"
          damage_type: physic
          crit_rule: no_crit   # no_crit / use_crit_chance / guaranteed_crit
          energy_refund_percent_param_name: "energyRefund"
          show_area: false            # per-tick red debug box off (VFX replaces it)
          effect_script: "res://resources/tower/holostars/en_branch/tempus_gen/hakka/skill_effect/hakka_field_evo_effect.gd"
          effects:
            - effect: move_speed_down       # per-tick slow (refresh; ~1 tick lag on leave)
              value_param: "slowEffect"
              duration: 1.5
      - type: play_animation
        data:
          animation: "idle"
  passive: null
